trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:

# -------------------------------
# Stage 1 - Build
# -------------------------------
- stage: Build
  displayName: Build React Application

  jobs:
  - job: Build

    steps:

    - checkout: self

    - task: UseNode@1
      inputs:
        version: '20.x'

    - script: npm ci
      displayName: Install Dependencies

    - script: npm run lint
      displayName: Run ESLint

    - script: npm run build
      displayName: Build React App

    - task: ArchiveFiles@2
      displayName: Archive React Build
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)/dist'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/react.zip'
        replaceExistingArchive: true

    - task: PublishPipelineArtifact@1
      displayName: Publish Build Artifact
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/react.zip'
        artifact: 'react-build'

# -------------------------------
# Stage 2 - Deploy
# -------------------------------
- stage: Deploy
  displayName: Deploy to Azure App Service

  dependsOn: Build

  jobs:

  - deployment: DeployWeb

    environment: Development

    strategy:

      runOnce:

        deploy:

          steps:

          - download: current
            artifact: react-build

          - task: AzureWebApp@1
            displayName: Deploy React App

            inputs:
              azureSubscription: 'autohub'
              appType: webAppLinux
              appName: 'auto-hub'
              package: '$(Pipeline.Workspace)/react-build/react.zip'